name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tenio
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d tenio"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # Local docker-compose maps host 5433 → Postgres; CI service uses 5432 on localhost.
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/tenio

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
