services:
  postgres:
    image: postgres:16
    container_name: tenio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tenio
    ports:
      - "5433:5432"
    volumes:
      - tenio-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tenio"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  tenio-postgres-data:
